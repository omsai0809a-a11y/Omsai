[build]
  base = "."
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/om-sai-enterprises run build"
  publish = "artifacts/om-sai-enterprises/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"
  PORT = "3000"
  BASE_PATH = "/"
  NPM_FLAGS = "--version"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
